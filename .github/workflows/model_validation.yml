name: Validate Interlis Model

on:
  # pull request events but only for the "main" branch
  # [pull_request_target]
  pull_request:
    branches: [main, master]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch: 

jobs:
  validate-iliModels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }} # checks out the branch that triggered the action (PR source)
          
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'adopt'
      - name: ili2cInstalation
        uses: ch-sz-geo/interlis-setup-action/setup-iliCompiler@v1
        with:
          path: ../ili2c
      - name: verify java Version
        run: java --version
      - name: Validate the Interlis Models
        run: |
          for file in models/*; do
            java -jar ../ili2c/ili2c.jar "$file"
          done
